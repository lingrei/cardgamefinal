<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 560px;
      text-align: center;
    }
    h1 {
      font-size: 3.5em;
      font-weight: 200;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ff4081 0%, #00bcd4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .status {
      font-size: 1em;
      color: #888;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: #e0e0e0;
      text-decoration: none;
      padding: 10px 20px;
      border: 1px solid #333;
      border-radius: 4px;
      transition: border-color 0.2s, color 0.2s;
      font-size: 0.95em;
    }
    .links a:hover {
      border-color: #00bcd4;
      color: #00bcd4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Card Game</h1>
    <p class="status">In Development</p>
    <div class="links">
      <a href="https://github.com/lingrei/cardgamefinal">GitHub</a>
    </div>
  </div>
</body>
</html>
